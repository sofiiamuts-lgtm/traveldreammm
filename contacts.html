<section id="contacts" class="page-section">
    <h2 class="section-title">Зворотній зв'язок</h2>
    <p class="section-subtitle">Маєш питання чи круті ідеї для подорожей? Напиши нам!</p>

    <div class="contact-wrapper">
        <div class="contact-info-panel">
            <h3>Конкакти</h3>
            <p style="margin: 20px 0;">📬 Email: info@traveldream.com</p>
            <p>Ми завжди раді співпраці з іншими мандрівниками, блогерами та фотографами!</p>
        </div>
        <div class="contact-form-panel">
            <form onsubmit="alert('Дякуємо! Ваше повідомлення успішно надіслано.'); return false;">
                <div class="form-group">
                    <label>Ваше ім'я</label>
                    <input type="text" placeholder="Введіть ім'я" required>
                </div>
                <div class="form-group">
                    <label>Ваш Email</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Повідомлення</label>
                    <textarea rows="4" placeholder="Текст вашого листа..." required></textarea>
                </div>
                <button type="submit" class="cta-btn" style="width: 100%;">Надіслати лист</button>
            </form>
        </div>
    </div>
</section>
